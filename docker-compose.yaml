# World Engine - Docker Compose Configuration
# Includes Mosquitto MQTT broker and World Engine simulation

services:
  # Eclipse Mosquitto MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: world_engine_mqtt
    ports:
      - "1883:1883"    # MQTT
      - "9001:9001"    # WebSocket (optional)
    volumes:
      - ./docker/mosquitto/config:/mosquitto/config:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_sub", "-t", "$$SYS/#", "-C", "1", "-i", "healthcheck", "-W", "3"]
      interval: 30s
      timeout: 10s
      retries: 3

  # World Engine Simulation
  world-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: world_engine_sim
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
    volumes:
      # Persist SQLite database
      - world_engine_data:/app/data
      # Mount config for easy modification
      - ./config.yaml:/app/config.yaml:ro
    restart: unless-stopped

  # Optional: MQTT Explorer for debugging (comment out in production)
  # mqtt-explorer:
  #   image: smeagolworms4/mqtt-explorer
  #   container_name: mqtt_explorer
  #   ports:
  #     - "4000:4000"
  #   depends_on:
  #     - mosquitto

volumes:
  mosquitto_data:
  mosquitto_log:
  world_engine_data:

networks:
  default:
    name: world_engine_net
