# World Engine Phase 3 Configuration
# Edge-to-Cloud Integration: Digital Twin & Secure Fleet Simulation

simulation:
  tick_interval: 5.0
  startup_jitter_max: 2.0
  outside_temperature: 15.0
  time_acceleration: 60

  night_cycle:
    enabled: true
    base_temp: 15.0
    amplitude: 8.0
    coldest_hour: 4

campus:
  id: "ZC-Main-Campus"
  buildings: ["B01", "B02"]
  floors_per_building: 10
  rooms_per_floor: 20

building:
  id: "b01"
  floors: 10
  rooms_per_floor: 20

mqtt:
  broker_host: "hivemq"
  broker_port: 1883
  client_id_prefix: "phase3_world_engine"
  topic_prefix: "campus"

  # OTA topics for configuration updates
  ota:
    broadcast_topic: "campus/+/+/ota/config"
    targeted_topic: "campus/{building}/{floor}/ota/config"

database:
  path: "world_engine_phase3.db"
  batch_interval: 30

physics:
  k_env: 0.01
  k_hvac: 0.2
  # These can be updated via OTA
  alpha: 0.01  # Thermal leakage coefficient
  beta: 0.2    # Heat capacity coefficient

defaults:
  initial_temp_min: 18.0
  initial_temp_max: 26.0
  initial_humidity_min: 30.0
  initial_humidity_max: 60.0
  target_temp: 22.0

faults:
  enabled: true
  sensor_drift_probability: 0.02
  frozen_sensor_probability: 0.01
  telemetry_delay_probability: 0.03
  node_dropout_probability: 0.005
  drift_rate: 0.05
  drift_max: 5.0
  dropout_min_ticks: 3
  dropout_max_ticks: 20
  delay_min: 0.5
  delay_max: 3.0

health:
  heartbeat_timeout: 60
  check_interval: 10
  publish_interval: 30

metrics:
  enabled: true
  publish_interval: 30

phase2:
  enabled: true
  floors: 10
  mqtt_nodes_per_floor: 10
  coap_nodes_per_floor: 10
  command_qos: 2
  edge_summary_window_seconds: 60
  heartbeat_timeout_seconds: 60
  dedup_cache_ttl_seconds: 30
  network:
    mqtt_host: "hivemq"
    mqtt_port: 1883
    mqtt_tls_port: 8883
    coap_bind_host: "0.0.0.0"
    coap_start_port: 5683
  security:
    mqtt_username_prefix: "mqtt_"
    mqtt_password_prefix: "pass_"
    psk_prefix: "psk-"

# Phase 3 specific configuration
phase3:
  enabled: true
  
  # Digital Twin Configuration
  digital_twin:
    thingsboard:
      host: "thingsboard"
      port: 8080
      username: "tenant@thingsboard.org"
      password: "tenant"
      asset_types:
        campus: "Campus"
        building: "Building"
        floor: "Floor"
        room: "Room"
      relation_types:
        contains: "Contains"
        manages: "Manages"
    
    # Room metadata (server-side attributes)
    room_metadata:
      square_footage_range: [30, 100]
      occupant_capacity_range: [10, 50]
      room_types: ["lecture_hall", "lab", "office", "corridor"]
      
  # Shadow State Synchronization
  shadow_sync:
    enabled: true
    sync_check_interval: 10  # seconds
    conflict_alert_threshold: 3  # number of mismatches before alert
    attributes_to_sync:
      - hvac_mode
      - lighting_dimmer
      - target_temp
    
  # OTA Update Configuration
  ota:
    enabled: true
    current_version: "1.0.0"
    update_check_interval: 60  # seconds
    verification:
      algorithm: "sha256"
      max_retries: 3
    updateable_parameters:
      - alpha
      - beta
      - k_env
      - k_hvac
    
  # Node-RED Gateway Configuration
  nodered:
    enabled: true
    host: "nodered"
    port: 1880
    flows_file: "flows/phase3_gateway.json"
    
  # Dashboard Configuration
  dashboard:
    enabled: true
    refresh_interval: 5  # seconds
    heatmap:
      temp_min: 18.0
      temp_max: 30.0
      color_cold: "#0000FF"
      color_hot: "#FF0000"
