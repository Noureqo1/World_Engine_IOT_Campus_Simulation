# Mosquitto Configuration for World Engine
# Eclipse Mosquitto MQTT Broker

# Listener for MQTT protocol
listener 1883
protocol mqtt

# Listener for WebSocket (optional, for browser clients)
listener 9001
protocol websockets

# Allow anonymous connections (development only)
# For production, configure authentication
allow_anonymous true

# Persistence settings
persistence true
persistence_location /mosquitto/data/

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information

# Connection settings
max_connections -1
max_inflight_messages 100

# Message settings
max_queued_messages 1000
message_size_limit 0

# Keepalive
max_keepalive 300
